services:
  marketing-postgres:
    image: postgres:16-alpine
    container_name: revendiste-marketing-postgres
    environment:
      POSTGRES_USER: marketing
      POSTGRES_PASSWORD: marketing
      POSTGRES_DB: marketing
    ports:
      - '5544:5432'
    volumes:
      - marketing_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U marketing -d marketing']
      interval: 5s
      timeout: 5s
      retries: 10

  marketing-redis:
    image: redis:7-alpine
    container_name: revendiste-marketing-redis
    ports:
      - '6479:6379'
    volumes:
      - marketing_redisdata:/data

  marketing-minio:
    image: minio/minio:latest
    container_name: revendiste-marketing-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - marketing_miniodata:/data

  marketing-minio-init:
    image: minio/mc:latest
    container_name: revendiste-marketing-minio-init
    depends_on:
      marketing-minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://marketing-minio:9000 minioadmin minioadmin;
      mc mb -p local/revendiste-marketing || true;
      exit 0;
      "

volumes:
  marketing_pgdata:
  marketing_redisdata:
  marketing_miniodata:
