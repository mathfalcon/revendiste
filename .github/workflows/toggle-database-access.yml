name: Toggle Database Access

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to target'
        required: true
        type: choice
        options:
          - dev
          - prod
      action:
        description: 'Enable or disable SSM database access'
        required: true
        type: choice
        options:
          - Start
          - Stop

env:
  AWS_REGION: sa-east-1

jobs:
  toggle:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment == 'dev' && 'development' || 'production' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set environment prefix
        run: echo "NAME_PREFIX=revendiste-${{ github.event.inputs.environment }}" >> $GITHUB_ENV

      # ─── STOP ────────────────────────────────────────────────────────────────

      - name: Stop — delete VPC endpoints
        if: github.event.inputs.action == 'Stop'
        run: |
          echo "=== Deleting SSM VPC endpoints for $NAME_PREFIX ==="

          ENDPOINT_IDS=$(aws ec2 describe-vpc-endpoints \
            --filters \
              "Name=tag:Name,Values=${NAME_PREFIX}-ssm-endpoint,${NAME_PREFIX}-ssmmessages-endpoint,${NAME_PREFIX}-ec2messages-endpoint" \
              "Name=vpc-endpoint-state,Values=available,pending" \
            --query 'VpcEndpoints[*].VpcEndpointId' \
            --output text \
            --region $AWS_REGION)

          if [ -z "$ENDPOINT_IDS" ]; then
            echo "No active VPC endpoints found — already stopped or never started."
          else
            echo "Found endpoints: $ENDPOINT_IDS"
            aws ec2 delete-vpc-endpoints \
              --vpc-endpoint-ids $ENDPOINT_IDS \
              --region $AWS_REGION \
              --no-cli-pager
            echo "VPC endpoints deletion initiated."
          fi

      - name: Stop — stop bastion instance
        if: github.event.inputs.action == 'Stop'
        run: |
          echo "=== Stopping bastion instance for $NAME_PREFIX ==="

          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=${NAME_PREFIX}-bastion" \
              "Name=instance-state-name,Values=running,pending" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text \
            --region $AWS_REGION)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "Bastion instance not found or already stopped."
          else
            echo "Stopping instance: $INSTANCE_ID"
            aws ec2 stop-instances \
              --instance-ids $INSTANCE_ID \
              --region $AWS_REGION \
              --no-cli-pager
            echo "Waiting for instance to stop..."
            aws ec2 wait instance-stopped \
              --instance-ids $INSTANCE_ID \
              --region $AWS_REGION
            echo "Bastion stopped."
          fi

          echo "=== Database access disabled for $NAME_PREFIX ==="

      # ─── START ───────────────────────────────────────────────────────────────

      - name: Start — start bastion instance
        if: github.event.inputs.action == 'Start'
        run: |
          echo "=== Starting bastion instance for $NAME_PREFIX ==="

          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=${NAME_PREFIX}-bastion" \
              "Name=instance-state-name,Values=stopped,stopping" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text \
            --region $AWS_REGION)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "Bastion instance not found in stopped state. It may already be running."
          else
            echo "Starting instance: $INSTANCE_ID"
            aws ec2 start-instances \
              --instance-ids $INSTANCE_ID \
              --region $AWS_REGION \
              --no-cli-pager
            echo "Waiting for instance to be running..."
            aws ec2 wait instance-running \
              --instance-ids $INSTANCE_ID \
              --region $AWS_REGION
            echo "Bastion running."
          fi

      - name: Start — recreate VPC endpoints
        if: github.event.inputs.action == 'Start'
        run: |
          echo "=== Creating SSM VPC endpoints for $NAME_PREFIX ==="

          is_blank() {
            case "${1:-}" in ''|'null'|'None') return 0 ;; *) return 1 ;; esac
          }

          # Prefer bastion instance (any state with network info); avoid Reservations[0] when list is empty
          INSTANCES_JSON=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${NAME_PREFIX}-bastion" \
            --query 'Reservations[].Instances[]' \
            --output json \
            --region $AWS_REGION)

          VPC_ID=$(echo "$INSTANCES_JSON" | jq -r 'if type == "array" and length > 0 then .[0].VpcId else empty end')
          SUBNET_ID=$(echo "$INSTANCES_JSON" | jq -r 'if type == "array" and length > 0 then .[0].SubnetId else empty end')

          # Fallback: Terraform tags the SSM endpoints SG and first private subnet even if bastion is missing from DescribeInstances
          if is_blank "$VPC_ID" || is_blank "$SUBNET_ID"; then
            echo "No bastion instance found by tag Name=${NAME_PREFIX}-bastion; resolving VPC via ${NAME_PREFIX}-ssm-endpoints-sg and subnet ${NAME_PREFIX}-private-1..."
            SG_META=$(aws ec2 describe-security-groups \
              --filters "Name=tag:Name,Values=${NAME_PREFIX}-ssm-endpoints-sg" \
              --query 'SecurityGroups[0].{VpcId:VpcId,GroupId:GroupId}' \
              --output json \
              --region $AWS_REGION)
            VPC_ID=$(echo "$SG_META" | jq -r '.VpcId // empty')
            if ! is_blank "$VPC_ID"; then
              SUBNET_ID=$(aws ec2 describe-subnets \
                --filters "Name=vpc-id,Values=$VPC_ID" "Name=tag:Name,Values=${NAME_PREFIX}-private-1" \
                --query 'Subnets[0].SubnetId' \
                --output text \
                --region $AWS_REGION)
            fi
          fi

          if is_blank "$VPC_ID" || is_blank "$SUBNET_ID"; then
            echo "::error::Could not resolve VPC/subnet for $NAME_PREFIX. Expected an instance tagged Name=${NAME_PREFIX}-bastion, or security group tagged Name=${NAME_PREFIX}-ssm-endpoints-sg plus subnet tagged Name=${NAME_PREFIX}-private-1. Check region $AWS_REGION and that credentials target the correct AWS account."
            exit 1
          fi

          echo "VPC: $VPC_ID  Subnet: $SUBNET_ID"

          # SSM endpoints SG (tag is unique per name_prefix; do not filter by vpc-id — empty vpc-id breaks the API)
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=tag:Name,Values=${NAME_PREFIX}-ssm-endpoints-sg" \
            --query 'SecurityGroups[0].GroupId' \
            --output text \
            --region $AWS_REGION)

          if is_blank "$SG_ID"; then
            echo "::error::Security group ${NAME_PREFIX}-ssm-endpoints-sg not found in $AWS_REGION. Apply Terraform for the bastion module first."
            exit 1
          fi

          echo "Endpoints SG: $SG_ID"

          # Get the current AWS region for service names
          REGION=$AWS_REGION

          create_endpoint() {
            local SERVICE_SUFFIX=$1
            local TAG_NAME=$2

            # Skip if an active endpoint with this name already exists
            EXISTING=$(aws ec2 describe-vpc-endpoints \
              --filters \
                "Name=tag:Name,Values=${TAG_NAME}" \
                "Name=vpc-endpoint-state,Values=available,pending" \
              --query 'VpcEndpoints[0].VpcEndpointId' \
              --output text \
              --region $REGION)

            if [ -n "$EXISTING" ] && [ "$EXISTING" != "None" ]; then
              echo "  $TAG_NAME already exists ($EXISTING) — skipping."
              return
            fi

            ENDPOINT_ID=$(aws ec2 create-vpc-endpoint \
              --vpc-id "$VPC_ID" \
              --service-name "com.amazonaws.${REGION}.${SERVICE_SUFFIX}" \
              --vpc-endpoint-type Interface \
              --subnet-ids "$SUBNET_ID" \
              --security-group-ids "$SG_ID" \
              --private-dns-enabled \
              --tag-specifications "ResourceType=vpc-endpoint,Tags=[{Key=Name,Value=${TAG_NAME}},{Key=Environment,Value=${{ github.event.inputs.environment }}},{Key=Project,Value=revendiste},{Key=ManagedBy,Value=github-actions}]" \
              --query 'VpcEndpoint.VpcEndpointId' \
              --output text \
              --region $REGION \
              --no-cli-pager)

            echo "  Created $TAG_NAME: $ENDPOINT_ID"
            echo "$ENDPOINT_ID"
          }

          SSM_ID=$(create_endpoint "ssm" "${NAME_PREFIX}-ssm-endpoint")
          SSMMSG_ID=$(create_endpoint "ssmmessages" "${NAME_PREFIX}-ssmmessages-endpoint")
          EC2MSG_ID=$(create_endpoint "ec2messages" "${NAME_PREFIX}-ec2messages-endpoint")

          echo "Waiting for endpoints to become available (this takes 1-3 minutes)..."

          # Collect all new endpoint IDs (filter out empty/None lines)
          NEW_IDS=$(echo -e "$SSM_ID\n$SSMMSG_ID\n$EC2MSG_ID" | grep -v '^$' | grep -v 'None' | tr '\n' ' ')

          if [ -n "$NEW_IDS" ]; then
            aws ec2 wait vpc-endpoint-exists \
              --filters \
                "Name=vpc-endpoint-id,Values=$(echo $NEW_IDS | tr ' ' ',')" \
                "Name=vpc-endpoint-state,Values=available" \
              --region $REGION 2>/dev/null || true

            # Poll until available (vpc-endpoint-exists waiter doesn't check state in all CLI versions)
            for i in $(seq 1 18); do
              PENDING=$(aws ec2 describe-vpc-endpoints \
                --filters \
                  "Name=tag:Name,Values=${NAME_PREFIX}-ssm-endpoint,${NAME_PREFIX}-ssmmessages-endpoint,${NAME_PREFIX}-ec2messages-endpoint" \
                  "Name=vpc-endpoint-state,Values=pending" \
                --query 'length(VpcEndpoints)' \
                --output text \
                --region $REGION)
              if [ "$PENDING" = "0" ]; then
                echo "All endpoints are available."
                break
              fi
              echo "  Still pending... ($((i * 10))s elapsed)"
              sleep 10
            done
          else
            echo "All endpoints were already available."
          fi

      - name: Start — wait for bastion to register with SSM
        if: github.event.inputs.action == 'Start'
        run: |
          echo "=== Waiting for bastion to register with SSM ==="

          INSTANCES_JSON=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${NAME_PREFIX}-bastion" \
            --query 'Reservations[].Instances[]' \
            --output json \
            --region $AWS_REGION)
          INSTANCE_ID=$(echo "$INSTANCES_JSON" | jq -r 'if type == "array" and length > 0 then .[0].InstanceId else empty end')

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::No bastion instance found with tag Name=${NAME_PREFIX}-bastion"
            exit 1
          fi

          echo "Bastion instance ID: $INSTANCE_ID"

          # After new VPC endpoints + instance start, SSM registration often needs several minutes.
          MAX_ROUNDS=40
          SLEEP_SECS=15
          SSM_ONLINE=false

          for i in $(seq 1 "$MAX_ROUNDS"); do
            RAW=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text \
              --region $AWS_REGION 2>&1) || true
            STATUS=$(echo "$RAW" | head -n1 | tr -d '\r' | xargs)

            case "$STATUS" in
              Online)
                echo "Bastion is online in SSM (PingStatus=Online)."
                SSM_ONLINE=true
                break
                ;;
              None|'')
                STATUS="not registered yet"
                ;;
            esac

            ELAPSED=$((i * SLEEP_SECS))
            echo "  SSM: $STATUS — waiting... (${ELAPSED}s elapsed, max $((MAX_ROUNDS * SLEEP_SECS))s)"
            sleep "$SLEEP_SECS"
          done

          if [ "$SSM_ONLINE" != "true" ]; then
            echo "::error::Bastion $INSTANCE_ID never reached SSM PingStatus=Online after $((MAX_ROUNDS * SLEEP_SECS))s. start-session will fail with TargetNotConnected until it registers."
            echo "Check: interface VPC endpoints (ssm, ssmmessages, ec2messages) are available in the bastion VPC; instance profile includes AmazonSSMManagedInstanceCore; security groups and NACLs allow HTTPS to those endpoints."
            echo "Last describe-instance-information line: $RAW"
            exit 1
          fi

          echo ""
          echo "=== Database access is ready ==="
          echo ""
          echo "To connect to the database, run:"
          echo ""
          echo "  aws ssm start-session \\"
          echo "    --target ${INSTANCE_ID} \\"
          echo "    --document-name AWS-StartPortForwardingSessionToRemoteHost \\"
          echo "    --parameters 'host=\"<RDS_ENDPOINT>\",portNumber=\"5432\",localPortNumber=\"5432\"'"
          echo ""
          echo "Replace <RDS_ENDPOINT> with your RDS address. Then connect locally on localhost:5432"
