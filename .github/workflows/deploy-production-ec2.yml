name: Deploy Production (EC2)

# Phase 5 production cutover deploy. Dispatch-only — the legacy
# .github/workflows/deploy-production.yml stays canonical until the
# DEV_VALIDATION_GATE has been signed off and the operator has uncommented the
# `module "ec2_app"` block in infrastructure/environments/production/main.tf
# (see docs/PROD_CUTOVER_CHECKLIST.md).
#
# Mirror of deploy-dev-ec2.yml with prod tags / hostnames. Keeps amd64-only?
# No — same as dev, the EC2 will be Graviton (arm64), so we publish arm64.

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (defaults to prod-<sha>)'
        required: false
        type: string
      confirm:
        description: 'Type CUTOVER to confirm production deploy via EC2 path'
        required: true
        type: string

env:
  AWS_REGION: sa-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.sa-east-1.amazonaws.com
  BACKEND_IMAGE_NAME: revendiste/backend-prod
  FRONTEND_IMAGE_NAME: revendiste/frontend-prod
  DEPLOY_BUCKET: revendiste-prod-deploy-artifacts
  APP_HOSTNAME: revendiste.com

jobs:
  guard:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Verify confirm input
        run: |
          if [ '${{ github.event.inputs.confirm }}' != 'CUTOVER' ]; then
            echo "::error::Type CUTOVER in the confirm input to proceed"
            exit 1
          fi

  build-backend:
    runs-on: ubuntu-24.04-arm
    needs: guard
    environment: production
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >>"$GITHUB_OUTPUT"
          else
            echo "image_tag=prod-${GITHUB_SHA::7}" >>"$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/backend.Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:buildcache-arm64
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:buildcache-arm64,mode=max

  build-frontend:
    runs-on: ubuntu-24.04-arm
    needs: build-backend
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/frontend.Dockerfile
          platforms: linux/arm64
          push: true
          build-args: |
            ENVIRONMENT=production
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ needs.build-backend.outputs.image_tag }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:buildcache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bundle deploy/ into a tarball
        run: |
          set -euo pipefail
          # Prod uses the SAME compose layout as dev EXCEPT the postgres
          # service is not started (compose profile gating handled by a
          # docker-compose.prod.yml override file the operator drops in once
          # Phase 5 lands). Until that override exists, prod cutover should
          # use a prod-specific compose file — see the placeholder
          # deploy/docker-compose.prod.yml.placeholder reminder.
          tar -C deploy -czvf deploy-bundle.tar.gz \
            docker-compose.dev.yml \
            Caddyfile \
            scripts
          ls -lh deploy-bundle.tar.gz

      - name: Upload bundle to S3
        run: |
          set -euo pipefail
          KEY="deploy-bundles/${GITHUB_SHA}.tar.gz"
          aws s3 cp deploy-bundle.tar.gz "s3://${DEPLOY_BUCKET}/${KEY}" --no-progress
          aws s3 cp deploy-bundle.tar.gz "s3://${DEPLOY_BUCKET}/deploy-bundles/latest.tar.gz" --no-progress

      - name: Resolve prod EC2 instance ID
        id: instance
        run: |
          set -euo pipefail
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=revendiste-prod-app-compute" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text \
            --region "$AWS_REGION")
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::Prod EC2 instance not found (tag Name=revendiste-prod-app-compute). Did you uncomment module.ec2_app in production/main.tf and apply?"
            exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >>"$GITHUB_OUTPUT"

      - name: Send deploy command via SSM
        id: ssm
        run: |
          set -euo pipefail
          INSTANCE_ID='${{ steps.instance.outputs.instance_id }}'
          IMAGE_TAG='${{ needs.build-backend.outputs.image_tag }}'

          REMOTE_SCRIPT=$(cat <<'EOS'
          set -euxo pipefail
          BUNDLE=/tmp/deploy-bundle.tar.gz
          aws s3 cp "s3://${DEPLOY_BUCKET}/deploy-bundles/latest.tar.gz" "$BUNDLE"
          mkdir -p /opt/revendiste/scripts
          tar -xzvf "$BUNDLE" -C /opt/revendiste
          chmod +x /opt/revendiste/scripts/*.sh
          chown -R root:root /opt/revendiste
          sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|" /opt/revendiste/runtime.env
          systemctl restart revendiste.service
          sleep 20
          docker compose --env-file /opt/revendiste/.env -f /opt/revendiste/docker-compose.dev.yml ps
          EOS
          )

          CMD_ID=$(aws ssm send-command \
            --document-name AWS-RunShellScript \
            --instance-ids "$INSTANCE_ID" \
            --comment "deploy-production-ec2 ${IMAGE_TAG}" \
            --parameters "{\"commands\":[$(jq -Rs . <<<"$REMOTE_SCRIPT")],\"executionTimeout\":[\"900\"]}" \
            --query 'Command.CommandId' \
            --output text \
            --region "$AWS_REGION")
          echo "command_id=$CMD_ID" >>"$GITHUB_OUTPUT"

      - name: Wait for SSM command to finish
        run: |
          set -euo pipefail
          CMD_ID='${{ steps.ssm.outputs.command_id }}'
          INSTANCE_ID='${{ steps.instance.outputs.instance_id }}'
          for i in $(seq 1 90); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text \
              --region "$AWS_REGION" 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success) echo "SSM command succeeded."; exit 0 ;;
              Cancelled|Failed|TimedOut)
                echo "::error::SSM command $STATUS"
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --region "$AWS_REGION" || true
                exit 1 ;;
              *) echo "  SSM status: $STATUS (attempt $i/90)"; sleep 10 ;;
            esac
          done
          echo "::error::SSM command did not finish within 15 minutes"
          exit 1

      - name: Health check via direct EIP
        run: |
          set -euo pipefail
          # Hit the EIP directly so we don't depend on Cloudflare DNS being
          # already cut over. Use --resolve to spoof the hostname for TLS SNI.
          EIP=$(aws ec2 describe-instances \
            --instance-ids '${{ steps.instance.outputs.instance_id }}' \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text \
            --region "$AWS_REGION")
          echo "Direct EIP: $EIP"

          probe() {
            local path=$1
            for i in $(seq 1 30); do
              code=$(curl -sk --resolve "${APP_HOSTNAME}:443:${EIP}" \
                -o /dev/null -w '%{http_code}' --max-time 10 \
                "https://${APP_HOSTNAME}${path}" || echo 000)
              if [ "$code" = "200" ]; then
                echo "OK: $path -> $code via $EIP"
                return 0
              fi
              echo "  $path -> $code via $EIP (attempt $i/30)"
              sleep 10
            done
            echo "::error::$path failed health check on $EIP"
            return 1
          }

          probe "/api/health"
          probe "/"
