name: Backend Integration Tests

on:
  pull_request:
    paths:
      - 'apps/backend/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/backend-integration-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/backend-integration-tests.yml'
  workflow_dispatch:

jobs:
  owner-invariants-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Docker is available
        run: docker info

      - name: Run backend integration tests
        run: pnpm --filter @revendiste/backend test:integration
