schema: spec-driven
persistence: hybrid

context: |
  Tech stack: TypeScript monorepo (Express 5 + TSOA + Kysely | React 19 + TanStack Router/Start + Tailwind 4 + shadcn/ui)
  Architecture: Backend Controllerâ†’Serviceâ†’Repository, Frontend Routesâ†’Featuresâ†’Components
  Testing: Jest 30 (backend only), ESLint + Prettier + tsc
  Infra: AWS ECS Fargate + RDS Aurora, Terraform, Cloudflare R2

strict_tdd: false

testing:
  runner:
    command: "pnpm test"
    framework: "Jest 30 + ts-jest"
    config: "apps/backend/jest.config.js"
  layers:
    unit: { available: true, tool: "Jest" }
    integration: { available: false }
    e2e: { available: false }
  coverage:
    available: true
    command: "cd apps/backend && pnpm test:coverage"
  quality:
    linter: { available: true, command: "eslint (frontend), gts lint (root)" }
    type_checker: { available: true, command: "tsc --noEmit" }
    formatter: { available: true, command: "prettier --write ." }

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
